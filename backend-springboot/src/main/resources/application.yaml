server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: backend-springboot

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/visual_artifact_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.visualartifact.backend: INFO
    org.hibernate.SQL: WARN

app:
  storage:
    local-path: ${LOCAL_STORAGE_PATH:uploads/artifacts}
  upload:
    max-file-size-bytes: ${MAX_UPLOAD_FILE_SIZE_BYTES:5242880}
    allowed-content-types:
      - image/png
      - image/jpeg
      - image/webp